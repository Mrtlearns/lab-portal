<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Lab Portal — Student Monitor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #111317; --surface: #1a1d24; --surface2: #22262f;
  --border: #2a2d35; --text: #d0d4de; --text-muted: #6b7280;
  --accent: #00d4aa; --accent2: #5794f2; --danger: #e05c5c;
  --online: #00d4aa; --offline: #e05c5c;
  --radius: 6px;
}
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── Topbar ── */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; height: 48px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.topbar-title { font-weight: 700; color: var(--accent); font-size: 1rem; }
.topbar-stats { font-size: 0.8rem; color: var(--text-muted); }
.topbar-stats b { color: var(--accent); }
.topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.btn { padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 0.8rem; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
.btn:hover { background: #2e3240; }
.btn-accent { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.btn-accent:hover { background: #00bfa0; }
.btn-shadow  { background: transparent; color: var(--accent); border-color: var(--accent); }
.btn-shadow:hover { background: rgba(0,220,180,.12); }
.refresh-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

/* ── Grid ── */
.grid-wrap { flex: 1; overflow-y: auto; padding: 16px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.empty-msg { color: var(--text-muted); text-align: center; margin-top: 80px; font-size: 0.9rem; }

/* ── Student card ── */
.student-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; position: relative; }
.student-card:hover { border-color: var(--accent2); box-shadow: 0 0 0 1px var(--accent2); }
.student-card.offline { opacity: 0.5; }

.card-thumb { width: 100%; aspect-ratio: 16/9; background: #000; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.card-thumb img { width: 100%; height: 100%; object-fit: contain; display: block; }
.card-thumb .no-img { color: var(--text-muted); font-size: 0.75rem; }

/* ── Select checkbox overlay on card ── */
.card-check { position: absolute; top: 6px; left: 6px; z-index: 3; width: 20px; height: 20px; cursor: pointer; appearance: none; -webkit-appearance: none; background: rgba(0,0,0,.55); border: 2px solid rgba(255,255,255,.55); border-radius: 4px; transition: border-color .12s, background .12s; }
.card-check:hover { border-color: var(--accent); }
.card-check:checked { background: var(--accent); border-color: var(--accent); }
.card-check:checked::after { content: ''; position: absolute; left: 4px; top: 0; width: 5px; height: 11px; border: 2px solid #071410; border-top: none; border-left: none; transform: rotate(45deg); }
.student-card.selected { box-shadow: 0 0 0 2px var(--accent) inset; }

/* ── Bulk-action bar ── */
.bulk-bar { display: flex; align-items: center; gap: 10px; padding-right: 4px; border-right: 1px solid var(--border); margin-right: 4px; }
.bulk-check-wrap { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--text-muted); cursor: pointer; user-select: none; }
.bulk-check-wrap input { width: 14px; height: 14px; cursor: pointer; accent-color: var(--accent); }
.bulk-count { font-size: 0.78rem; color: var(--accent); font-weight: 600; }
.btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
.btn-danger:hover:not(:disabled) { background: rgba(224,92,92,.12); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }

.card-footer { padding: 8px 10px; display: flex; align-items: center; gap: 6px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.status-dot.online  { background: var(--online); box-shadow: 0 0 4px var(--online); }
.status-dot.offline { background: var(--offline); }
.card-username { font-weight: 600; font-size: 0.85rem; flex: 1; }
.card-age { font-size: 0.7rem; color: var(--text-muted); }
.card-actions { display: flex; gap: 4px; }
.card-btn { padding: 3px 7px; font-size: 0.7rem; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; }
.card-btn:hover { background: #2e3240; }
.card-btn.primary { border-color: var(--accent2); color: var(--accent2); }
.card-btn.primary:hover { background: rgba(87,148,242,.12); }
.card-btn.shadow  { border-color: var(--accent); color: var(--accent); }
.card-btn.shadow:hover { background: rgba(0,220,180,.12); }
.card-btn.rec     { border-color: var(--danger); color: var(--danger); }
.card-btn.rec:hover { background: rgba(224,92,92,.12); }
.card-btn.rec.active { background: var(--danger); color: #fff; }
.card-btn.rec.active:hover { background: #c64a4a; }

/* REC badge shown over card thumbnail when recording */
.rec-badge { position: absolute; top: 6px; right: 6px; z-index: 3;
  background: var(--danger); color: #fff; font-size: 0.65rem; font-weight: 700;
  padding: 2px 6px; border-radius: 10px; display: flex; align-items: center; gap: 4px;
  letter-spacing: 0.5px; box-shadow: 0 0 6px rgba(224,92,92,.7); }
.rec-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: #fff; animation: pulse 1.4s infinite; }

/* ── Fullscreen modal ── */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
.modal-bg.hidden { display: none; }
.modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; width: 90vw; max-width: 1400px; }
.modal-username { font-weight: 700; font-size: 1.1rem; color: var(--accent); }
.modal-ts { font-size: 0.8rem; color: var(--text-muted); }
.modal-header-actions { margin-left: auto; display: flex; gap: 8px; }
#modal-img { max-width: 90vw; max-height: 85vh; border-radius: 6px; border: 1px solid var(--border); object-fit: contain; display: block; }

/* ── Guacamole overlay ── */
.guac-overlay { position: fixed; inset: 0; background: #000; z-index: 200; display: flex; flex-direction: column; }
.guac-overlay.hidden { display: none; }
.guac-bar { background: var(--surface); border-bottom: 1px solid var(--border); height: 40px; display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
.guac-bar-title { font-weight: 600; font-size: 0.9rem; color: var(--accent2); }
.guac-bar-note { font-size: 0.75rem; color: var(--text-muted); }
.guac-bar-close { margin-left: auto; }
.guac-bar-close button { padding: 4px 10px; font-size: 0.8rem; border-radius: 4px; border: 1px solid var(--danger); background: transparent; color: var(--danger); cursor: pointer; }
.guac-bar-close button:hover { background: rgba(224,92,92,.12); }
#guac-frame { flex: 1; border: none; width: 100%; }

/* ── Past Recordings panel (below the student grid) ── */
.rec-section { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }
.rec-section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.rec-section-head h3 { font-size: 0.95rem; color: var(--text); font-weight: 600; }
.rec-section-head .rec-count { color: var(--text-muted); font-weight: 400; font-size: 0.8rem; }
.rec-section-controls { margin-left: auto; display: flex; gap: 6px; align-items: center; }
.rec-section-controls input { font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); width: 140px; }
.rec-list-mon { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; max-height: 360px; overflow-y: auto; background: var(--surface); }
.rec-row-mon { display: grid; grid-template-columns: 100px 110px 80px 70px 90px 1fr; gap: 10px; padding: 8px 12px; align-items: center; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
.rec-row-mon:last-child { border-bottom: 0; }
.rec-row-mon:hover { background: var(--surface2); }
.rec-row-mon .rec-user { font-weight: 600; color: var(--accent2); }
.rec-row-mon .rec-date { color: var(--text-muted); }
.rec-row-mon .rec-time { color: var(--text-muted); font-variant-numeric: tabular-nums; }
.rec-row-mon .rec-size { color: var(--text-muted); text-align: right; font-variant-numeric: tabular-nums; }
.rec-row-mon .rec-status { font-size: 0.7rem; }
.rec-row-mon .rec-status.ready   { color: var(--accent); }
.rec-row-mon .rec-status.pending { color: #d59f31; }
.rec-row-mon .rec-status.raw     { color: var(--text-muted); }
.rec-row-mon .rec-actions { display: flex; gap: 6px; justify-content: flex-end; }
.rec-row-mon .rec-actions button, .rec-row-mon .rec-actions a { font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; text-decoration: none; }
.rec-row-mon .rec-actions button:hover:not(:disabled), .rec-row-mon .rec-actions a:hover { background: #2e3240; }
.rec-row-mon .rec-actions button:disabled { opacity: 0.4; cursor: not-allowed; }
.rec-row-mon .rec-actions .danger { border-color: var(--danger); color: var(--danger); }
.rec-row-mon .rec-actions .danger:hover { background: rgba(224,92,92,.12); }
.rec-empty-mon { padding: 30px 16px; text-align: center; color: var(--text-muted); font-size: 0.85rem; }

/* ── Player modal (shared on this page) ── */
.modal-rec-bg { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: flex; align-items: center; justify-content: center; z-index: 150; padding: 30px; }
.modal-rec-bg.hidden { display: none; }
.modal-rec-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; width: 100%; max-width: 1100px; }
.modal-rec-box h3 { margin-bottom: 10px; font-size: 0.95rem; color: var(--text); }
.modal-rec-box video { width: 100%; max-height: 70vh; background: #000; border-radius: 4px; display: block; }
.modal-rec-box .modal-rec-foot { margin-top: 10px; display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">Student Monitor</span>
  <span class="topbar-stats">
    <b id="stat-online">0</b> online &nbsp;·&nbsp; <b id="stat-total">0</b> seen this session
  </span>
  <div class="topbar-right">
    <div class="bulk-bar">
      <label class="bulk-check-wrap" title="Select / clear all online students">
        <input type="checkbox" id="bulk-select-all"> All
      </label>
      <span class="bulk-count" id="bulk-count">0 selected</span>
      <button class="btn btn-danger" id="btn-logoff" disabled title="Force logoff selected students from Win2025RDS and kill their Guacamole tunnels">🚪 Log off</button>
    </div>
    <span class="refresh-indicator" title="Auto-refreshing"></span>
    <span id="refresh-label" style="font-size:0.75rem;color:var(--text-muted)">Refresh: 10s</span>
    <select id="refresh-select" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px 6px;font-size:0.75rem;">
      <option value="5">5s</option>
      <option value="10" selected>10s</option>
      <option value="20">20s</option>
      <option value="30">30s</option>
    </select>
    <a href="/dashboard.html" class="btn">← Dashboard</a>
    <a href="/instructor.html" class="btn">Manage Courses</a>
  </div>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid">
    <div class="empty-msg" id="empty-msg">Waiting for students to connect…<br><small style="margin-top:6px;display:block">Screenshots appear automatically when the agent runs in each student session.</small></div>
  </div>

  <!-- Past Recordings — visible regardless of whether student card is on screen -->
  <div class="rec-section">
    <div class="rec-section-head">
      <h3>Past Recordings <span class="rec-count" id="rec-count-mon"></span></h3>
      <div class="rec-section-controls">
        <input id="rec-filter-mon" placeholder="filter user / date…" oninput="renderRecordingsMon()">
        <button class="btn" onclick="loadRecordingsMon()" title="Refresh">↻</button>
      </div>
    </div>
    <div class="rec-list-mon" id="rec-list-mon">
      <div class="rec-empty-mon">Loading…</div>
    </div>
  </div>
</div>

<!-- Player modal -->
<div class="modal-rec-bg hidden" id="modal-rec-mon">
  <div class="modal-rec-box">
    <h3 id="modal-rec-title-mon">Session Recording</h3>
    <video id="modal-rec-video-mon" controls preload="metadata"></video>
    <div class="modal-rec-foot">
      <a id="modal-rec-download-mon" class="btn" download>⬇ Download .mp4</a>
      <button class="btn" onclick="closeRecPlayerMon()">Close</button>
    </div>
  </div>
</div>

<!-- Screenshot fullscreen modal -->
<div class="modal-bg hidden" id="modal">
  <div class="modal-header">
    <span class="modal-username" id="modal-username"></span>
    <span class="modal-ts" id="modal-ts"></span>
    <div class="modal-header-actions">
      <button class="btn btn-shadow" id="modal-open-shadow">👁 Shadow</button>
      <button class="btn btn-accent" id="modal-open-session">🔌 Session</button>
      <button class="btn" onclick="closeModal()">✕ Close</button>
    </div>
  </div>
  <img id="modal-img" src="" alt="Student screen">
</div>

<!-- Live Guacamole session overlay -->
<div class="guac-overlay hidden" id="guac-overlay">
  <div class="guac-bar">
    <span class="guac-bar-title" id="guac-bar-title"></span>
    <span class="guac-bar-note"></span>
    <div class="guac-bar-close"><button onclick="closeGuac()">✕ Close Session</button></div>
  </div>
  <iframe id="guac-frame" src="about:blank" allow="fullscreen; pointer-lock" allowfullscreen tabindex="0"></iframe>
</div>

<script>
const GUAC_URL   = 'https://lab.training.playsap.us/guacamole/';
const GUAC_PASS  = '123456';

let refreshInterval = 10;
let refreshTimer    = null;
let activeUser      = null;
// username → img element (in card)
const cardImgs = new Map();
// usernames currently checkbox-selected for bulk actions
const selectedUsers = new Set();
// usernames whose Guacamole connection currently has recording-* params set
const recordingUsers = new Set();

async function fetchStatus() {
  const res  = await fetch('/api/screenshots');
  const list = await res.json();
  return list;
}

function ageLabel(ms) {
  if (ms < 15000)  return 'just now';
  if (ms < 60000)  return `${Math.floor(ms/1000)}s ago`;
  if (ms < 3600000) return `${Math.floor(ms/60000)}m ago`;
  return 'long ago';
}

function buildCard(entry) {
  const card = document.createElement('div');
  card.className = `student-card ${entry.online ? '' : 'offline'}`;
  card.dataset.user = entry.user;

  const thumb = document.createElement('div');
  thumb.className = 'card-thumb';
  const img = document.createElement('img');
  img.alt  = entry.user;
  img.src  = `/api/screenshots/${entry.user}?t=${Date.now()}`;
  img.onerror = () => { img.style.display='none'; };
  thumb.appendChild(img);
  cardImgs.set(entry.user, img);

  const check = document.createElement('input');
  check.type = 'checkbox';
  check.className = 'card-check';
  check.dataset.user = entry.user;
  check.title = `Select ${entry.user} for bulk action`;
  check.addEventListener('click', e => e.stopPropagation());
  check.addEventListener('change', () => {
    card.classList.toggle('selected', check.checked);
    if (check.checked) selectedUsers.add(entry.user);
    else selectedUsers.delete(entry.user);
    updateBulkUi();
  });
  thumb.appendChild(check);

  const footer = document.createElement('div');
  footer.className = 'card-footer';
  footer.innerHTML = `
    <span class="status-dot ${entry.online ? 'online' : 'offline'}"></span>
    <span class="card-username">${entry.user}</span>
    <span class="card-age" data-ts="${entry.ts}">${ageLabel(entry.age)}</span>
    <div class="card-actions">
      <button class="card-btn rec" onclick="toggleRecord(event,'${entry.user}')" title="Start / stop session recording (briefly disconnects student)">⏺ Rec</button>
      <button class="card-btn shadow" onclick="openShadow(event,'${entry.user}')" title="Shadow student's exact session (silent)">👁 Shadow</button>
      <button class="card-btn primary" onclick="openSession(event,'${entry.user}')" title="Connect as student (will disconnect them)">🔌 Session</button>
    </div>`;

  card.appendChild(thumb);
  card.appendChild(footer);
  card.addEventListener('dblclick', () => openModal(entry.user));
  card.addEventListener('click', e => { if (!e.target.closest('.card-actions')) openModal(entry.user); });
  return card;
}

async function refresh() {
  let list;
  try { list = await fetchStatus(); } catch { return; }

  const grid = document.getElementById('grid');
  const emptyMsg = document.getElementById('empty-msg');

  if (!list.length) {
    emptyMsg.style.display = '';
    document.getElementById('stat-online').textContent = 0;
    document.getElementById('stat-total').textContent  = 0;
    return;
  }
  emptyMsg.style.display = 'none';

  const online = list.filter(e => e.online).length;
  document.getElementById('stat-online').textContent = online;
  document.getElementById('stat-total').textContent  = list.length;

  // Add new cards / update existing
  list.forEach(entry => {
    let card = grid.querySelector(`[data-user="${entry.user}"]`);
    if (!card) {
      card = buildCard(entry);
      grid.appendChild(card);
    } else {
      // Refresh image
      const img = cardImgs.get(entry.user);
      if (img) img.src = `/api/screenshots/${entry.user}?t=${Date.now()}`;
      // Update status
      card.className = `student-card ${entry.online ? '' : 'offline'}`;
      const dot = card.querySelector('.status-dot');
      if (dot) { dot.className = `status-dot ${entry.online ? 'online' : 'offline'}`; }
      const age = card.querySelector('.card-age');
      if (age) age.textContent = ageLabel(entry.age);
    }
  });

  // Update modal image if open
  if (activeUser) {
    const mi = document.getElementById('modal-img');
    if (mi) mi.src = `/api/screenshots/${activeUser}?t=${Date.now()}`;
    const mts = document.getElementById('modal-ts');
    const entry = list.find(e => e.user === activeUser);
    if (mts && entry) mts.textContent = ageLabel(entry.age);
  }

  // Reapply recording badges to any newly-added cards
  applyRecordingUi();
}

function openModal(user) {
  activeUser = user;
  document.getElementById('modal-username').textContent = user;
  document.getElementById('modal-img').src = `/api/screenshots/${user}?t=${Date.now()}`;
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal-open-session').onclick = () => { closeModal(); openSession(null, user); };
  document.getElementById('modal-open-shadow').onclick  = () => { closeModal(); openShadow(null, user); };
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  activeUser = null;
}

async function openSession(e, user) {
  if (e) e.stopPropagation();
  closeModal();

  const overlay = document.getElementById('guac-overlay');
  const frame   = document.getElementById('guac-frame');
  const title   = document.getElementById('guac-bar-title');
  const note    = document.querySelector('.guac-bar-note');

  // Show overlay with loading state
  title.textContent = `Connecting to ${user}…`;
  note.textContent  = 'Getting session token…';
  frame.src = 'about:blank';
  overlay.classList.remove('hidden');

  // Get a fresh auth token — this bypasses any cached browser Guacamole session
  // The token is fetched server-side, then injected into the Guacamole URL hash.
  // Guacamole 1.4+ reads #?token=TOKEN and uses it for auth, ignoring cookies.
  try {
    const resp = await fetch(`/api/guac-token/${encodeURIComponent(user)}`);
    const data = await resp.json();

    if (!data.token) {
      // User is not a Guacamole user (e.g. VAS, Administrator from Windows-only sessions)
      title.textContent = `No session: ${user}`;
      note.textContent  = `⚠ "${user}" has no Guacamole account — screenshot monitoring only.`;
      frame.src = 'about:blank';
      return;
    }

    // Token obtained — load Guacamole with it injected in the URL hash.
    // This makes Guacamole use THIS token regardless of what's cached in the browser.
    title.textContent = `Session: ${user}`;
    note.textContent  = 'Live session — student may be aware of your presence';
    frame.src = `${GUAC_URL}#?token=${encodeURIComponent(data.token)}`;

  } catch (err) {
    title.textContent = `Error: ${user}`;
    note.textContent  = `Failed to get session token: ${err.message}`;
    console.error('[monitor] openSession error:', err);
  }
}

function closeGuac() {
  document.getElementById('guac-overlay').classList.add('hidden');
  document.getElementById('guac-frame').src = 'about:blank';
}

// Shadow: silently view the student's exact RDP session (no notification, full control)
// Uses mstsc /shadow:<sessionId> /noconsentprompt /control via a temp Guacamole connection
async function openShadow(e, user) {
  if (e) e.stopPropagation();
  closeModal();

  const overlay = document.getElementById('guac-overlay');
  const frame   = document.getElementById('guac-frame');
  const title   = document.getElementById('guac-bar-title');
  const note    = document.querySelector('.guac-bar-note');

  title.textContent = `Shadowing ${user}…`;
  note.textContent  = 'Requesting shadow session…';
  frame.src = 'about:blank';
  overlay.classList.remove('hidden');

  try {
    const resp = await fetch(`/api/shadow/${encodeURIComponent(user)}`);
    const data = await resp.json();

    if (!resp.ok || !data.url) {
      title.textContent = `Shadow failed: ${user}`;
      note.textContent  = `⚠ ${data.error || 'Unknown error'} — is the screenshot agent running?`;
      frame.src = 'about:blank';
      return;
    }

    title.textContent = `👁 Shadowing ${user} (session ${data.sessionId})`;
    note.textContent  = '🔇 Silent shadow — student has NO notification. Full control active.';
    frame.src = data.url;
    // Auto-focus the iframe so Guacamole captures mouse immediately without requiring a click
    frame.onload = () => { try { frame.contentWindow.focus(); } catch(e) {} frame.focus(); };
    setTimeout(() => frame.focus(), 800);

  } catch (err) {
    title.textContent = `Error: ${user}`;
    note.textContent  = `Failed to start shadow: ${err.message}`;
    console.error('[monitor] openShadow error:', err);
  }
}

function startTimer() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(refresh, refreshInterval * 1000);
}

document.getElementById('refresh-select').addEventListener('change', e => {
  refreshInterval = parseInt(e.target.value);
  document.getElementById('refresh-label').textContent = `Refresh: ${refreshInterval}s`;
  startTimer();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeGuac(); }
});

// ── Bulk select + logoff ──────────────────────────────────────────────────
function updateBulkUi() {
  const n = selectedUsers.size;
  document.getElementById('bulk-count').textContent = `${n} selected`;
  document.getElementById('btn-logoff').disabled = n === 0;
  // Keep the "All" checkbox in sync (indeterminate / checked / unchecked)
  const boxes = [...document.querySelectorAll('.card-check')];
  const all = document.getElementById('bulk-select-all');
  if (!boxes.length) { all.checked = false; all.indeterminate = false; return; }
  const checked = boxes.filter(b => b.checked).length;
  all.checked = checked === boxes.length;
  all.indeterminate = checked > 0 && checked < boxes.length;
}

document.getElementById('bulk-select-all').addEventListener('change', e => {
  const want = e.target.checked;
  document.querySelectorAll('.card-check').forEach(b => {
    if (b.checked !== want) { b.checked = want; b.dispatchEvent(new Event('change')); }
  });
});

document.getElementById('btn-logoff').addEventListener('click', async () => {
  const users = [...selectedUsers];
  if (!users.length) return;
  if (!confirm(`Log off ${users.length} student${users.length === 1 ? '' : 's'}?\n\n${users.join(', ')}\n\nThis will force-end their Windows session (logoff /sessionId) AND kill their Guacamole tunnels. They cannot resume — reconnecting starts a fresh session.`)) return;

  const btn = document.getElementById('btn-logoff');
  btn.disabled = true;
  btn.textContent = '⏳ Logging off…';

  let results;
  try {
    const r = await fetch('/api/logoff', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ users }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'HTTP ' + r.status);
    results = data.results || [];
  } catch (e) {
    alert('Logoff request failed: ' + e.message);
    btn.disabled = false;
    btn.textContent = '🚪 Log off';
    return;
  }

  // The logoff URLs are admin RDP connections whose initial-program = `logoff <sid>`.
  // They need to actually CONNECT for guacd to run the command — so we load each
  // in a hidden iframe for ~10s, then tear it down.
  const trigger = document.createElement('div');
  trigger.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;';
  document.body.appendChild(trigger);
  results.forEach(r => {
    if (!r.logoffUrl) return;
    const f = document.createElement('iframe');
    f.src = r.logoffUrl;
    f.width = '1'; f.height = '1';
    trigger.appendChild(f);
  });
  setTimeout(() => trigger.remove(), 12000);

  // Remove cards whose server-side entry we just dropped so the stale image
  // disappears immediately — the next /api/screenshots won't return them.
  const grid = document.getElementById('grid');
  results.forEach(r => {
    const killed = r.logoffUrl || (r.tunnelsKilled || 0) > 0;
    if (!killed) return;
    const card = grid.querySelector(`[data-user="${r.user}"]`);
    if (card) card.remove();
    cardImgs.delete(r.user);
  });

  // Summarise
  const okRds  = results.filter(r => r.logoffUrl).length;
  const noSess = results.filter(r => !r.sessionId).length;
  const killed = results.reduce((a, r) => a + (r.tunnelsKilled || 0), 0);
  const errors = results.filter(r => r.error);
  let msg = `Logoff issued — RDS: ${okRds}/${users.length} (${noSess} had no session), Guac tunnels killed: ${killed}.`;
  if (errors.length) msg += `\n\n${errors.length} error(s):\n` + errors.map(r => `• ${r.user}: ${r.error}`).join('\n');
  alert(msg);

  // Clear selection, refresh
  selectedUsers.clear();
  document.querySelectorAll('.card-check').forEach(b => { b.checked = false; });
  document.querySelectorAll('.student-card.selected').forEach(c => c.classList.remove('selected'));
  btn.disabled = true;
  btn.textContent = '🚪 Log off';
  updateBulkUi();
  refresh();
});

// ── Recording toggle ──────────────────────────────────────────────────────
async function refreshRecording() {
  try {
    const r = await fetch('/api/recording');
    if (!r.ok) return;
    const d = await r.json();
    recordingUsers.clear();
    (d.recording || []).forEach(e => recordingUsers.add(e.user));
    applyRecordingUi();
  } catch (_) { /* ignore — UI just won't update */ }
}

function applyRecordingUi() {
  document.querySelectorAll('.student-card').forEach(card => {
    const user = card.dataset.user;
    const recBtn = card.querySelector('.card-btn.rec');
    const thumb  = card.querySelector('.card-thumb');
    const isOn   = recordingUsers.has(user);
    if (recBtn) {
      recBtn.classList.toggle('active', isOn);
      recBtn.textContent = isOn ? '⏹ Rec' : '⏺ Rec';
      recBtn.title = isOn
        ? 'Stop recording (briefly disconnects student)'
        : 'Start recording (briefly disconnects student)';
    }
    let badge = thumb && thumb.querySelector('.rec-badge');
    if (isOn && thumb && !badge) {
      badge = document.createElement('div');
      badge.className = 'rec-badge';
      badge.textContent = 'REC';
      thumb.appendChild(badge);
    } else if (!isOn && badge) {
      badge.remove();
    }
  });
}

async function toggleRecord(e, user) {
  if (e) e.stopPropagation();
  const isOn = recordingUsers.has(user);
  const action = isOn ? 'stop' : 'start';
  const verb   = isOn ? 'Stop recording for' : 'Start recording for';
  if (!confirm(`${verb} ${user}?\n\nThis disconnects their Guacamole tunnel briefly so the new setting takes effect. They reconnect with one click.`)) return;

  const btn = e ? e.target.closest('.card-btn') : null;
  if (btn) { btn.disabled = true; btn.textContent = '⏳…'; }

  try {
    const r = await fetch(`/api/recording/${action}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ users: [user] }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'HTTP ' + r.status);
    const result = (data.results || [])[0] || {};
    if (result.error) throw new Error(result.error);
    await refreshRecording();
    if (action === 'start' && result.filename) {
      console.log(`[recording] started for ${user}: ${result.filename}.guac`);
    }
  } catch (err) {
    alert(`Recording ${action} failed for ${user}: ${err.message}`);
  } finally {
    if (btn) btn.disabled = false;
    applyRecordingUi();
  }
}

// ── Past Recordings (visible whether the student card is on screen or not) ──
let recCacheMon = [];
async function loadRecordingsMon() {
  try {
    const r = await fetch('/api/recordings');
    const d = await r.json();
    recCacheMon = d.recordings || [];
  } catch (_) { recCacheMon = []; }
  renderRecordingsMon();
}
function renderRecordingsMon() {
  const list = document.getElementById('rec-list-mon');
  if (!list) return;
  const filter = (document.getElementById('rec-filter-mon')?.value || '').toLowerCase().trim();
  const rows = recCacheMon.filter(r => !filter || r.user.toLowerCase().includes(filter) || r.name.toLowerCase().includes(filter) || (r.date||'').includes(filter));
  document.getElementById('rec-count-mon').textContent = recCacheMon.length
    ? `(${rows.length}${filter ? ' of ' + recCacheMon.length : ''})`
    : '';
  if (!rows.length) {
    list.innerHTML = `<div class="rec-empty-mon">${recCacheMon.length ? 'No matches.' : 'No recordings yet — toggle Rec on a student card to start one.'}</div>`;
    return;
  }
  list.innerHTML = rows.map(r => {
    const sizeStr = r.sizeMB == null ? '—' : (r.sizeMB >= 1 ? `${r.sizeMB.toFixed(1)} MB` : `${(r.sizeMB*1024).toFixed(0)} KB`);
    let status, primaryAction;
    if (r.ready) {
      status = `<span class="rec-status ready">● ready</span>`;
      primaryAction = `<button onclick="playRecordingMon('${r.name}')">▶ Play</button>
                       <a class="btn" href="${r.m4vUrl}" download>⬇</a>`;
    } else if (r.converting) {
      status = `<span class="rec-status pending">● converting</span>`;
      primaryAction = `<button disabled>⏳ Converting…</button>`;
    } else if (r.queued) {
      status = `<span class="rec-status pending">● queued</span>`;
      primaryAction = `<button disabled>⏳ Queued…</button>`;
    } else {
      status = `<span class="rec-status raw">● raw .guac</span>`;
      primaryAction = `<button onclick="convertAndPlayMon('${r.name}')" title="Convert at full speed (instructor priority)">⚡ Convert &amp; Play</button>`;
    }
    return `<div class="rec-row-mon">
      <span class="rec-user">${r.user}</span>
      <span class="rec-date">${r.date}</span>
      <span class="rec-time">${r.time}</span>
      <span class="rec-size">${sizeStr}</span>
      <span>${status}</span>
      <span class="rec-actions">${primaryAction}<button class="danger" onclick="deleteRecordingMon('${r.name}')" title="Delete recording (irreversible)">🗑</button></span>
    </div>`;
  }).join('');
}
function playRecordingMon(name) {
  const rec = recCacheMon.find(r => r.name === name);
  if (!rec || !rec.m4vUrl) return;
  document.getElementById('modal-rec-title-mon').textContent = `${rec.user} — ${rec.date} ${rec.time}`;
  const v = document.getElementById('modal-rec-video-mon');
  v.src = rec.m4vUrl;
  document.getElementById('modal-rec-download-mon').href = rec.m4vUrl;
  document.getElementById('modal-rec-download-mon').setAttribute('download', `${rec.name}.mp4`);
  document.getElementById('modal-rec-mon').classList.remove('hidden');
  v.play().catch(() => {});
}
function closeRecPlayerMon() {
  const v = document.getElementById('modal-rec-video-mon');
  v.pause(); v.removeAttribute('src'); v.load();
  document.getElementById('modal-rec-mon').classList.add('hidden');
}
async function convertAndPlayMon(name) {
  if (!confirm(
    `Convert "${name}" now?\n\n` +
    `Runs at full speed on the guacamole host (all available cores).\n` +
    `If a class is in progress, this may briefly impact live sessions.\n\n` +
    `Otherwise it will convert automatically after hours.`
  )) return;
  try {
    const r = await fetch(`/api/recordings/${encodeURIComponent(name)}/convert`, { method: 'POST' });
    if (!r.ok) { alert('Convert failed: ' + r.status); return; }
    const d = await r.json();
    if (d.status === 'ready') { await loadRecordingsMon(); playRecordingMon(name); return; }
  } catch (e) { alert('Convert failed: ' + e.message); return; }
  // Poll up to 10 min
  const t0 = Date.now();
  await loadRecordingsMon(); // refresh to show "queued" state immediately
  while (Date.now() - t0 < 600000) {
    await new Promise(r => setTimeout(r, 2500));
    await loadRecordingsMon();
    const fresh = recCacheMon.find(r => r.name === name);
    if (fresh?.ready) { playRecordingMon(name); return; }
  }
  alert('Conversion timed out after 10 minutes — check host logs.');
}
async function deleteRecordingMon(name) {
  if (!confirm(`Delete "${name}" permanently?\n\nThis removes the .guac source AND the .mp4 (if any). Cannot be undone.`)) return;
  try {
    const r = await fetch(`/api/recordings/${encodeURIComponent(name)}`, { method: 'DELETE' });
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      alert('Delete failed: ' + (e.error || r.status));
      return;
    }
  } catch (e) { alert('Delete failed: ' + e.message); return; }
  await loadRecordingsMon();
}

// Init
refresh();
refreshRecording();
loadRecordingsMon();
startTimer();
setInterval(refreshRecording, 30000);
setInterval(loadRecordingsMon, 30000);
</script>
