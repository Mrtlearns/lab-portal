<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>SAP Lab Portal — Tutorial</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body class="tutorial-standalone">
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo">🎓 SAP Lab Portal — Tutorial</span>
      <span id="course-title" class="course-title"></span>
    </div>
    <div class="topbar-right">
      <select id="exercise-select" class="exercise-select" disabled>
        <option value="">— Loading —</option>
      </select>
      <button id="btn-prev" class="btn" disabled>&#8592; Prev</button>
      <button id="btn-next" class="btn" disabled>Next &#8594;</button>
      <button id="btn-refresh"  class="btn btn-icon" title="Refresh lab content (re-fetch from server)">&#x21BB;</button>
      <button id="btn-font-up"   class="btn btn-icon" title="Increase text size">A+</button><button id="btn-font-down" class="btn btn-icon" title="Decrease text size">A−</button>
      <button id="btn-download" class="btn btn-icon" title="Download this lab as .md">&#x2B73;</button>
    </div>
  </header>
  <main class="tutorial-full">
    <div class="pane-right" id="pane-right">
      <div id="tutorial-title" class="tutorial-title"></div>
      <div id="tutorial-content" class="tutorial-content">
        <div class="placeholder">Loading&hellip;</div>
      </div>
    </div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="/tutorial.js"></script>
</body>
</html>
